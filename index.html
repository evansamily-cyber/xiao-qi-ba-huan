        { name: "前任现女友的社交小号", rarity: "epic", isSecret: true },
        { name: "老板偷偷面试你替代者的证据", rarity: "legend", isSecret: true },
        { name: "闺蜜瞒着你的购物金额", rarity: "common", isSecret: true },
        { name: "某个群聊的匿名爆料", rarity: "rare", isSecret: true },
        { name: "楼上邻居深夜噪音的真相", rarity: "rare", isSecret: true },
        { name: "某乎高赞匿名回答的原型", rarity: "epic", isSecret: true },
        { name: "你未来伴侣的第一次相遇场景", rarity: "legend", isSecret: true }
    ];

    // 补全数量
    for(let i = 0; i < 5; i++) pawnItems.push({ name: `未命名的故事碎片#${i+1}`, rarity: "common", isStory: true });
    for(let i = 0; i < 5; i++) exchangeItems.push({ name: `别人的小秘密#${i+1}`, rarity: "common", isSecret: true });

    // ---------- 全局状态 ----------
    let currentMode = "random";
    let currentPawn = null;
    let currentExchange = null;
    let currentStoryTag = "";
    let activeTagButton = null;

    // Fix C4：用单一 timer 变量代替多个 setTimeout 竞争
    let _msgTimer = null;

    // ---------- 工具函数 ----------

    function getRandomItem(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function rarityClass(rarity) {
        switch(rarity) {
            case 'common': return 'rarity-common';
            case 'rare':   return 'rarity-rare';
            case 'epic':   return 'rarity-epic';
            case 'legend': return 'rarity-legend';
            default:       return '';
        }
    }

    function getDisplayName(pawnObj) {
        if (pawnObj && pawnObj.tag) {
            return `【${pawnObj.tag}】${pawnObj.name}`;
        }
        return pawnObj ? pawnObj.name : "—";
    }

    // Fix Minor：提取 storyTagPanel 显示/隐藏逻辑，避免重复代码
    function updateStoryTagPanel(isStory) {
        document.getElementById('storyTagPanel').style.display = isStory ? 'block' : 'none';
    }

    // Fix C4：showMessage 使用 clearTimeout 避免多个超时竞争覆盖
    function showMessage(msg, isSpecial = false) {
        const msgDiv = document.getElementById('messageArea');
        msgDiv.innerHTML = msg;
        msgDiv.style.background = isSpecial ? "#2a1c0ecc" : "#0a0602cc";
        msgDiv.style.borderLeftColor = isSpecial ? "#ffcc66" : "#d4af37";
        // 清除上一个挂起的超时，再设新的
        if (_msgTimer) clearTimeout(_msgTimer);
        _msgTimer = setTimeout(() => {
            document.getElementById('messageArea').innerHTML = "⚖️ 换都换了，别后悔。";
            _msgTimer = null;
        }, 4000);
    }

    // ---------- 显示更新 ----------

    function updateDisplay() {
        if(currentPawn) {
            document.getElementById('pawnName').innerHTML = getDisplayName(currentPawn);
            const pawnRaritySpan = document.getElementById('pawnRarity');
            pawnRaritySpan.innerHTML = `✨ ${currentPawn.rarity.toUpperCase()}`;
            pawnRaritySpan.className = `item-rarity ${rarityClass(currentPawn.rarity)}`;
            const pawnStoryTag = document.getElementById('pawnStoryTag');
            if(currentPawn.isStory) {
                pawnStoryTag.innerHTML = '📖 你的故事';
                pawnStoryTag.style.display = 'inline-block';
            } else {
                pawnStoryTag.innerHTML = '';
                pawnStoryTag.style.display = '';
            }
        } else {
            document.getElementById('pawnName').innerHTML = '—';
            document.getElementById('pawnRarity').innerHTML = '';
            document.getElementById('pawnStoryTag').innerHTML = '';
        }
        if(currentExchange) {
            document.getElementById('exchangeName').innerHTML = currentExchange.name;
            const exchRaritySpan = document.getElementById('exchangeRarity');
            exchRaritySpan.innerHTML = `🎁 ${currentExchange.rarity.toUpperCase()}`;
            exchRaritySpan.className = `item-rarity ${rarityClass(currentExchange.rarity)}`;
            const exchStoryTag = document.getElementById('exchangeStoryTag');
            if(currentExchange.isSecret) {
                exchStoryTag.innerHTML = '🔮 别人的秘密';
                exchStoryTag.style.display = 'inline-block';
            } else {
                exchStoryTag.innerHTML = '';
                exchStoryTag.style.display = '';
            }
        } else {
            document.getElementById('exchangeName').innerHTML = '—';
            document.getElementById('exchangeRarity').innerHTML = '';
            document.getElementById('exchangeStoryTag').innerHTML = '';
        }
    }

    // ---------- 交换逻辑 ----------

    function getStoryExchangeMessage(pawn, exchange) {
        const pawnDisplay = getDisplayName(pawn);
        if(pawn.isStory && exchange.isSecret) {
            return `📖 八卦契约生效！你丢了「${pawnDisplay}」，捞到了别人的秘密：「${exchange.name}」。灵魂交换完成。`;
        } else if(pawn.isStory && !exchange.isSecret) {
            return `📖 你献出了故事「${pawnDisplay}」，换回了奇葩能力：「${exchange.name}」。故事换能力，不亏。`;
        } else if(!pawn.isStory && exchange.isSecret) {
            return `🔍 你用「${pawn.name}」换来了一个秘密：「${exchange.name}」。当铺低语：'保守秘密也是一种诅咒。'`;
        }
        return null;
    }

    function randomTrade() {
        const newPawn = getRandomItem(pawnItems);
        let tag = "";
        if (newPawn.isStory && Math.random() < 0.2) {
            const randomTags = ["最破防的瞬间", "最悲伤的瞬间", "最后悔的瞬间", "最尴尬的瞬间"];
            tag = randomTags[Math.floor(Math.random() * randomTags.length)];
        }
        currentPawn = { ...newPawn, tag };
        currentExchange = { ...getRandomItem(exchangeItems) };
        updateDisplay();
        let msg = getStoryExchangeMessage(currentPawn, currentExchange);
        if(!msg) msg = `🎲 瞎七八换：你丢了「${getDisplayName(currentPawn)}」，捞到了「${currentExchange.name}」`;
        showMessage(msg);
        checkRarityBonus();
    }

    function chooseTrade(pawnObjWithTag) {
        if(!pawnObjWithTag) return;
        currentPawn = pawnObjWithTag;
        currentExchange = { ...getRandomItem(exchangeItems) };
        updateDisplay();
        let msg = getStoryExchangeMessage(currentPawn, currentExchange);
        if(!msg) msg = `✋ 自选瞎换：你丢了「${getDisplayName(currentPawn)}」，捞到了「${currentExchange.name}」`;
        showMessage(msg);
        checkRarityBonus();
    }

    // Fix C1：合并两次 showMessage 调用，避免第二条消息覆盖第一条
    function checkRarityBonus() {
        const exchLegend = currentExchange && currentExchange.rarity === 'legend';
        const pawnLegend = currentPawn && currentPawn.rarity === 'legend';
        if (exchLegend && pawnLegend) {
            showMessage("🔥 双传说！当铺钟声响彻三条街，连老板都站起来了。", true);
        } else if (exchLegend) {
            showMessage("🏆 传说级秘密！连当铺老板都多看了你一眼。", true);
        } else if (pawnLegend) {
            showMessage("💀 你丢掉了传说级故事，当铺的钟声响了三次。", true);
        }
    }

    // ---------- 标签逻辑 ----------

    function clearTagUI() {
        currentStoryTag = "";
        if(activeTagButton) {
            activeTagButton.classList.remove('active');
            activeTagButton = null;
        }
        const customInput = document.getElementById('customTagInput');
        if(customInput) customInput.value = "";
    }

    function setTag(tagText) {
        currentStoryTag = tagText;
        if(currentPawn && currentPawn.isStory) {
            currentPawn.tag = currentStoryTag;
            updateDisplay();
        }
        // 同步按钮高亮状态
        const buttons = document.querySelectorAll('.tag-btn');
        let found = false;
        buttons.forEach(btn => {
            const btnTag = btn.getAttribute('data-tag');
            if(tagText && btnTag === tagText) {
                btn.classList.add('active');
                activeTagButton = btn;
                found = true;
            } else {
                btn.classList.remove('active');
            }
        });
        if(!found) activeTagButton = null;
    }

    function initTagSelector() {
        const tagBtns = document.querySelectorAll('.tag-btn');
        tagBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tag = btn.getAttribute('data-tag');
                // 再次点击同一标签则取消
                setTag(currentStoryTag === tag ? "" : tag);
            });
        });
        document.getElementById('applyCustomTag').addEventListener('click', () => {
            const custom = document.getElementById('customTagInput').value.trim();
            if(custom !== "") {
                setTag(custom);
                document.getElementById('customTagInput').value = "";
            }
        });
    }

    // ---------- 选择器填充 ----------

    function populateSelect() {
        const select = document.getElementById('pawnSelect');
        select.innerHTML = '';
        pawnItems.forEach(item => {
            const option = document.createElement('option');
            option.value = item.name;
            option.innerText = `${item.isStory ? '📖 ' : ''}${item.name} (${item.rarity})`;
            select.appendChild(option);
        });

        select.addEventListener('change', (e) => {
            const selectedName = e.target.value;
            const found = pawnItems.find(p => p.name === selectedName);
            if(found) {
                // 切换物品时：若新物品是故事则保留已有 tag，否则清空
                const newTag = found.isStory ? currentStoryTag : "";
                if(!found.isStory) clearTagUI();
                currentPawn = { ...found, tag: newTag };
                updateStoryTagPanel(found.isStory);
                if(found.isStory && newTag) setTag(newTag);
                updateDisplay();
            }
        });
    }

    // ---------- 模式切换 ----------

    function setMode(mode) {
        currentMode = mode;
        const randomBtn   = document.getElementById('modeRandomBtn');
        const chooseBtn   = document.getElementById('modeChooseBtn');
        const choosePanel = document.getElementById('choosePawnPanel');
        const randomHint  = document.getElementById('randomPawnHint');

        if(mode === 'random') {
            randomBtn.classList.add('mode-active');
            chooseBtn.classList.remove('mode-active');
            choosePanel.style.display = 'none';
            randomHint.style.display = 'block';
            currentPawn = null;
            currentExchange = null;
            updateDisplay();
        } else {
            chooseBtn.classList.add('mode-active');
            randomBtn.classList.remove('mode-active');
            choosePanel.style.display = 'block';
            randomHint.style.display = 'none';

            // Fix W2：安全读取 pawnSelect，避免 null 引用
            const select = document.getElementById('pawnSelect');
            if(select && select.options.length) {
                const selectedVal = select.value;
                const selectedObj = pawnItems.find(p => p.name === selectedVal)
                                 || pawnItems[0];
                if(selectedObj) {
                    // 若物品不是故事，清空 tag
                    if(!selectedObj.isStory) {
                        currentStoryTag = "";
                        clearTagUI();
                    }
                    currentPawn = { ...selectedObj, tag: selectedObj.isStory ? currentStoryTag : "" };
                    updateStoryTagPanel(selectedObj.isStory);
                    updateDisplay();
                }
            }
        }
        showMessage("⚖️ 切换模式，重置瞎换。");
    }

    // ---------- 重置 ----------

    // Fix C3：消除重复的 select.value 读取，逻辑统一
    function resetDisplay() {
        currentPawn = null;
        currentExchange = null;
        currentStoryTag = "";
        clearTagUI();
        updateDisplay();
        document.getElementById('messageArea').innerHTML = "🕯️ 瞎七八换大厅空荡荡，等你来搞。";
        if(_msgTimer) { clearTimeout(_msgTimer); _msgTimer = null; }

        if(currentMode === 'choose') {
            const selectEl = document.getElementById('pawnSelect');
            if(selectEl && selectEl.options.length) {
                // 统一使用当前选中值（或首项兜底）
                const selectedName = selectEl.value || selectEl.options[0].value;
                const selectedPawnObj = pawnItems.find(p => p.name === selectedName);
                if(selectedPawnObj) {
                    currentPawn = { ...selectedPawnObj, tag: "" };
                    updateDisplay();
                    // Fix W3：通过工具函数更新 storyTagPanel，不再依赖重复代码
                    updateStoryTagPanel(selectedPawnObj.isStory);
                }
            }
        }
    }

    // ---------- 执行交换 ----------

    function executeTrade() {
        if(currentMode === 'random') {
            randomTrade();
        } else {
            if(!currentPawn) {
                showMessage("先选个东西丢进去吧~");
                return;
            }
            currentPawn.tag = currentPawn.isStory ? currentStoryTag : "";
            chooseTrade(currentPawn);
        }
    }

    // ---------- 初始化 ----------

    // Fix C2：init 中去掉末尾多余的 resetDisplay()，
    //         setMode('random') 已完成初始状态设置，无需再次覆盖
    function init() {
        populateSelect();
        initTagSelector();

        document.getElementById('tradeBtn').addEventListener('click', executeTrade);
        document.getElementById('resetBtn').addEventListener('click', resetDisplay);
        document.getElementById('modeRandomBtn').addEventListener('click', () => setMode('random'));
        document.getElementById('modeChooseBtn').addEventListener('click', () => setMode('choose'));
        document.getElementById('confirmPawnBtn').addEventListener('click', () => {
            if(currentMode !== 'choose') return;
            if(currentPawn) {
                currentPawn.tag = currentPawn.isStory ? currentStoryTag : "";
                chooseTrade(currentPawn);
            } else {
                showMessage("典当物失效，重新选一个");
            }
        });

        // 设置初始模式（会正确初始化 currentPawn = null 并调用 updateDisplay）
        setMode('random');
        // 覆盖 setMode 留下的提示文字，换成更友好的欢迎语
        document.getElementById('messageArea').innerHTML = "🕯️ 瞎七八换大厅空荡荡，等你来搞。";
        if(_msgTimer) { clearTimeout(_msgTimer); _msgTimer = null; }
    }

    init();
</script>
</body>
</html>
