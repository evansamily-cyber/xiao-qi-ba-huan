<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>瞎七八换 · 情绪交易所</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at 20% 30%, #1b0f2e, #07020d);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Poppins', sans-serif;
            min-height: 100vh;
            padding-bottom: 80px;
            color: #f0eaff;
        }

        /* 恶魔装饰 */
        .demon-deco {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 70px;
            opacity: 0.2;
            pointer-events: none;
            z-index: 0;
            filter: drop-shadow(0 0 4px #b77cff);
            animation: float 8s infinite ease-in-out;
        }
        .demon-deco-right {
            top: 20px;
            right: 20px;
            left: auto;
            bottom: auto;
            font-size: 60px;
        }
        @keyframes float {
            0%   { transform: translateY(0px); }
            50%  { transform: translateY(-18px); }
            100% { transform: translateY(0px); }
        }

        /* 主容器 */
        .app {
            max-width: 1300px;
            margin: 0 auto;
            padding: 24px 20px;
            position: relative;
            z-index: 10;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 48px;
        }
        h1 {
            font-size: 4rem;
            background: linear-gradient(135deg, #f3c6ff, #bc7aff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 8px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .sub {
            color: #bda0f0;
            font-size: 1rem;
            letter-spacing: 2px;
            font-weight: 300;
        }

        /* 卡片 */
        .glass-card {
            background: rgba(25, 18, 40, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 1px solid rgba(168, 85, 247, 0.35);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: all 0.25s ease;
        }

        /* 入口按钮 */
        .entry-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 28px;
            margin-bottom: 40px;
        }
        .entry {
            background: linear-gradient(135deg, rgba(44,28,70,0.8), rgba(28,18,48,0.9));
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 32px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(168,85,247,0.5);
            box-shadow: 0 15px 25px -10px rgba(0,0,0,0.3);
        }
        .entry:hover {
            transform: translateY(-6px);
            border-color: #d946ef;
            box-shadow: 0 25px 30px -12px rgba(168,85,247,0.4);
            background: linear-gradient(135deg, rgba(54,36,84,0.9), rgba(36,24,60,0.95));
        }
        .entry-icon { font-size: 56px; margin-bottom: 16px; }
        .entry-title {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #eccdff, #c490ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .entry-desc { color: #c4a6f0; margin-top: 8px; font-size: 0.85rem; }

        /* 大厅网格 */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 28px;
        }
        .item-card {
            background: rgba(30,20,50,0.7);
            backdrop-filter: blur(8px);
            border-radius: 1.75rem;
            overflow: hidden;
            transition: all 0.2s;
            border: 1px solid rgba(168,85,247,0.3);
            cursor: pointer;
        }
        .item-card:hover {
            transform: translateY(-5px);
            border-color: #c084fc;
            box-shadow: 0 20px 30px -12px #a855f730;
        }
        .item-img {
            width: 100%;
            height: 160px;
            background: #2d1d48;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }
        .item-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .item-info { padding: 16px; }
        .item-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #f3e5ff;
            margin-bottom: 6px;
        }
        .item-desc {
            font-size: 0.8rem;
            color: #c6b0f0;
            line-height: 1.4;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }
        .item-value {
            background: rgba(124,58,237,0.5);
            border-radius: 60px;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .resonate-btn {
            background: none;
            border: none;
            color: #ffafef;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .exchange-btn {
            background: #b45eff;
            border: none;
            border-radius: 60px;
            padding: 6px 14px;
            font-weight: 600;
            color: #2d0f3a;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.1s;
        }
        .exchange-btn:hover { background: #d28eff; }

        /* 盲盒页 */
        .blind-input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 60px;
            background: #1b112c;
            border: 1px solid #a855f7;
            color: white;
            font-size: 1rem;
            margin-bottom: 20px;
            outline: none;
            font-family: inherit;
            transition: 0.2s;
        }
        .blind-input:focus {
            border-color: #d946ef;
            box-shadow: 0 0 0 2px #c084fc40;
        }
        .score-slider {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            color: #e2b5ff;
        }
        .score-slider input[type="range"] { flex: 1; }
        .open-btn {
            background: linear-gradient(95deg, #8b5cf6, #c026d3);
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.2rem;
            border: none;
            color: white;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 8px 20px -6px #a855f7;
        }
        .open-btn:hover { filter: brightness(1.1); }
        .open-btn:active { transform: scale(0.98); }
        .history-list {
            margin-top: 28px;
            border-top: 1px solid #4a2e6e;
            padding-top: 20px;
        }
        .history-item {
            border-bottom: 1px solid #3f2a5a;
            padding: 12px 0;
            display: flex;
            gap: 12px;
            align-items: center;
            color: #c9b0ff;
        }

        /* 导航栏 */
        .nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15,10,25,0.96);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 24px;
            border-top: 1px solid #a855f7;
            z-index: 100;
        }
        .nav-item {
            text-align: center;
            color: #c7b0ff;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 6px 16px;
            border-radius: 60px;
            transition: 0.1s;
            font-weight: 500;
        }
        .nav-item.active { background: #7c3aed; color: white; }

        /* 模态框 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s, visibility 0.2s;
        }
        .modal.show { visibility: visible; opacity: 1; }
        .modal-content {
            background: #1a0f2e;
            border-radius: 2rem;
            max-width: 90%;
            width: 500px;
            padding: 32px;
            border: 1px solid #d946ef;
            box-shadow: 0 25px 40px -12px black;
            color: #f0eaff;
            max-height: 90vh;
            overflow-y: auto;
        }
        .detail-img {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 1rem;
            margin-bottom: 16px;
            background: #2d1d48;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }
        .hidden-glow { animation: glow 0.6s ease-out forwards; }
        @keyframes glow {
            0%   { box-shadow: 0 0 0 0 #ff80df; }
            100% { box-shadow: 0 0 30px 10px #ff44cc; }
        }

        /* 表单元素 */
        input[type="text"], input[type="file"], textarea, select {
            background: #22173a;
            border: 1px solid #7c3aed;
            border-radius: 1rem;
            padding: 12px;
            color: white;
            width: 100%;
            margin-bottom: 12px;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
        }
        input[type="text"]:focus, textarea:focus, select:focus {
            border-color: #d946ef;
        }
        .modal-content label {
            display: block;
            margin-bottom: 6px;
            color: #e2b5ff;
            font-size: 0.85rem;
        }
        .btn-primary {
            background: #8b5cf6;
            border: none;
            border-radius: 2rem;
            padding: 10px 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.1s;
        }
        .btn-primary:hover { background: #a070ff; }
        .btn-ghost {
            background: transparent;
            border: 1px solid #a855f7;
            border-radius: 2rem;
            padding: 10px 20px;
            color: #e2b5ff;
            cursor: pointer;
            transition: 0.1s;
        }
        .btn-ghost:hover { background: rgba(168,85,247,0.15); }

        /* 图片预览 */
        .file-preview {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
        }
        .file-preview img {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border-radius: 12px;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d1a4a;
            color: #e9b3ff;
            border: 1px solid #d946ef;
            border-radius: 40px;
            padding: 12px 28px;
            z-index: 400;
            font-size: 0.9rem;
            text-align: center;
            max-width: 90%;
            pointer-events: none;
            transition: opacity 0.4s;
        }

        button { cursor: pointer; font-family: inherit; }

        @media (max-width: 700px) {
            .entry-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
<div class="demon-deco">🐉</div>
<div class="demon-deco demon-deco-right">👹</div>
<div class="app">
    <div class="header">
        <h1>瞎七八换</h1>
        <div class="sub">把你不想要的，换成意想不到的</div>
    </div>

    <!-- 首页 -->
    <div id="homePage" class="page active-page">
        <div class="entry-grid">
            <div class="entry" onclick="showPage('blindboxPage')">
                <div class="entry-icon">🎲</div>
                <div class="entry-title">随机盲盒</div>
                <div class="entry-desc">输入你想丢掉的东西，换一份惊喜</div>
            </div>
            <div class="entry" onclick="showPage('hallPage')">
                <div class="entry-icon">🏛️</div>
                <div class="entry-title">交换大厅</div>
                <div class="entry-desc">看看别人在换什么，发起交易</div>
            </div>
        </div>
        <div class="glass-card" style="padding: 20px; text-align: center;">
            <div style="color:#d9b8ff;">✨ 小恶魔的低语</div>
            <div style="font-size: 1.1rem; margin-top: 8px; font-style: italic; color:#e9b3ff;">"走进这里，你想典当什么？"</div>
            <div style="margin-top: 16px; font-size: 0.85rem; color:#bda0f0;">
                💎 交换积分: <strong id="pointsDisplay" style="color:#e9b3ff;">0</strong>
                &nbsp;|&nbsp;
                <span id="proxyStatus">🔒 盲盒代开需3次交换</span>
            </div>
            <button id="proxyOpenBtn" style="margin-top:16px; background:#7c3aed; border:none; border-radius:60px; padding:8px 20px; color:white; font-weight:bold;" disabled>🔒 盲盒代开（还需3次交换）</button>
        </div>
    </div>

    <!-- 交换大厅 -->
    <div id="hallPage" class="page">
        <div class="glass-card" style="padding: 24px;">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:20px;">
                <h3 style="color:#e9d5ff;">📦 交换集市</h3>
                <button onclick="showPublish()" style="background:#7c3aed; border:none; border-radius:60px; padding:8px 20px; color:white; font-weight:bold;">+ 发布交换物</button>
            </div>
            <div id="itemsGrid" class="items-grid"></div>
        </div>
    </div>

    <!-- 随机盲盒页 -->
    <div id="blindboxPage" class="page">
        <div class="glass-card" style="padding: 28px;">
            <h3 style="color:#e9d5ff; margin-bottom:20px;">🎁 随机盲盒</h3>
            <input type="text" id="blindInput" class="blind-input" placeholder="例如：我对老板的怨气、加班黑眼圈、前任的回忆...">
            <div class="score-slider">
                <span>预期值（1~10）:</span>
                <input type="range" id="blindScoreSlider" min="1" max="10" value="5" step="1">
                <span id="scoreValue" style="min-width:18px;">5</span>
                <span style="font-size:0.7rem; color:#8a6eb0;">（可微调）</span>
            </div>
            <button id="openBlindBtn" class="open-btn">🎲 瞎七八换</button>
            <div class="history-list">
                <div style="color:#c9b0ff; margin-bottom:12px;">📜 你的交换档案</div>
                <div id="blindHistoryList"></div>
            </div>
        </div>
    </div>

    <!-- 个人中心 -->
    <div id="profilePage" class="page">
        <div class="glass-card" style="padding: 28px;">
            <h3 style="color:#e9d5ff; margin-bottom:16px;">😈 我的小恶魔仓库</h3>
            <div id="profileContent" style="color:#c9b0ff; line-height:2.2;"></div>
        </div>
    </div>

    <!-- 发布弹窗 -->
    <div id="publishModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom:20px; color:#e9d5ff;">发布你的交换物</h3>
            <label>标题（必填，最多30字）</label>
            <input type="text" id="pubTitle" placeholder="加班怨气 / 前任的围巾..." maxlength="30">
            <label>描述（必填，最多200字）</label>
            <textarea id="pubDesc" placeholder="详细描述（它是什么？为什么想换？）" rows="3" maxlength="200" style="resize:vertical;"></textarea>
            <label>上传图片（可选，JPEG/PNG，&lt;2MB）</label>
            <input type="file" id="pubImageInput" accept="image/jpeg,image/png">
            <div id="imagePreview" class="file-preview"></div>
            <label>预期值（1~10）</label>
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
                <input type="range" id="pubValue" min="1" max="10" value="5" style="flex:1; margin-bottom:0;">
                <span id="pubValueShow" style="min-width:18px;">5</span>
            </div>
            <button id="confirmPublish" class="btn-primary" style="width:100%;">发布到大厅</button>
            <button onclick="closePublish()" class="btn-ghost" style="width:100%; margin-top:10px;">取消</button>
        </div>
    </div>

    <!-- 交换详情弹窗 -->
    <div id="exchangeModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom:16px; color:#e9d5ff;">发起交换</h3>
            <div id="exchangeTargetInfo" style="color:#c9b0ff; margin-bottom:16px;"></div>
            <label>用我的什么东西交换？</label>
            <select id="myItemsSelect" style="margin-bottom:8px;"></select>
            <button id="quickNewForExchange" class="btn-ghost" style="margin-bottom:16px; width:100%;">➕ 临时新建一个</button>
            <div id="matchHint" style="font-size:0.8rem; color:#bda0f0; margin-bottom:16px;"></div>
            <button id="confirmExchangeBtn" class="btn-primary" style="width:100%; background:#c026d3;">确认交换</button>
            <button onclick="closeExchangeModal()" class="btn-ghost" style="width:100%; margin-top:10px;">取消</button>
        </div>
    </div>

    <!-- 物品详情弹窗 -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div id="detailContent"></div>
            <button onclick="closeDetailModal()" style="background:#7c3aed; border:none; border-radius:60px; padding:10px 24px; color:white; font-weight:bold; margin-top:16px; width:100%;">关闭</button>
        </div>
    </div>
</div>

<div class="nav">
    <div class="nav-item active" data-page="homePage">🏠 首页</div>
    <div class="nav-item" data-page="hallPage">🏛️ 大厅</div>
    <div class="nav-item" data-page="blindboxPage">🎲 盲盒</div>
    <div class="nav-item" data-page="profilePage">👤 我的</div>
</div>

<script>
    // ─── 数据模型 ─────────────────────────────────────────────────
    let items        = [];
    let exchanges    = [];
    let blindHistory = [];
    let userPoints   = 0;
    let hiddenUnlocked  = false;
    let consecutiveMiss = 0; // 连续未出隐藏次数（保底计数）

    // Fix：图片数据单独存储，避免 xqh_items 撑爆 localStorage 配额
    // imgData 运行时缓存在 itemImageCache，key = item.id
    const itemImageCache = {};

    // ─── 物品池 ───────────────────────────────────────────────────
    const commonPool = [
        { name: "一只在路上的牛",            score: 2, img: "🐮", type: "普通" },
        { name: "八卦：楼下邻居的真实身份",   score: 3, img: "🗣️", type: "稀有" },
        { name: "加班摸鱼指南",               score: 4, img: "📖", type: "稀有" },
        { name: "前男友的悔过书（复印件）",   score: 5, img: "💔", type: "史诗" },
        { name: "永续黑眼圈使用权",           score: 6, img: "👁️", type: "史诗" },
        { name: "老板的脑回路U盘",            score: 8, img: "🧠", type: "传说" },
        { name: "一次假装社牛的机会",          score: 7, img: "🦜", type: "史诗" },
        { name: "无人知晓的树洞秘密",          score: 5, img: "🌳", type: "稀有" },
        { name: "会骂老板的鹦鹉",             score: 6, img: "🦜", type: "史诗" },
        { name: "30秒速成的好心情",            score: 4, img: "☀️", type: "稀有" }
    ];
    const hiddenPool = [
        { name: "一个迟到的拥抱",      score: 10, img: "🤗", message: "那一刻，有人穿越时间抱住了你。" },
        { name: "你从未收到的道歉信",  score: 10, img: "💌", message: "对不起……其实他一直都知道。" },
        { name: "母亲没说出口的骄傲",  score: 10, img: "👩", message: "她常常跟邻居提起你。" },
        { name: "那个雨夜的自己",      score: 10, img: "🌧️", message: "你原谅了从前那个笨拙的自己。" },
        { name: "云抱抱",              score: 10, img: "☁️", message: "有人隔着屏幕轻轻拥抱了你。" }
    ];
    const emotionKeywords = ["后悔","失去","想念","愧疚","孤单","妈妈","爸爸","奶奶","遗憾","对不起","再见","别离","痛哭","崩溃","难过","焦虑","抑郁"];

    // ─── 持久化 ───────────────────────────────────────────────────
    function loadData() {
        try {
            const si = localStorage.getItem('xqh_items');
            // items 里不再存 imgData（太大），只存元数据
            items = si ? JSON.parse(si) : [
                { id: 1001, title:"加班怨气一团",       desc:"连续两周加班，怨气冲天，想换个开心的事",   value:4, hasImg:false, creator:"匿名", resonate:0, time:Date.now() },
                { id: 1002, title:"前任的围巾",          desc:"挺暖和的，但留着尴尬，希望换一个治愈的东西", value:6, hasImg:false, creator:"匿名", resonate:0, time:Date.now() },
                { id: 1003, title:"弹《小星星》技能",    desc:"可教，换一个有趣的故事或技能",             value:3, hasImg:false, creator:"匿名", resonate:0, time:Date.now() }
            ];
            // 从独立 key 恢复图片缓存
            items.forEach(item => {
                if(item.hasImg) {
                    const stored = localStorage.getItem(`xqh_img_${item.id}`);
                    if(stored) itemImageCache[item.id] = stored;
                    else item.hasImg = false; // 图片已被清除
                }
            });
            const se = localStorage.getItem('xqh_exchanges');
            exchanges = se ? JSON.parse(se) : [];
            const sb = localStorage.getItem('xqh_blind');
            blindHistory = sb ? JSON.parse(sb) : [];
            const sp = localStorage.getItem('xqh_points');
            userPoints = sp ? parseInt(sp) : 0;
            hiddenUnlocked = !!localStorage.getItem('xqh_hidden');
        } catch(e) {
            console.warn('数据加载失败，使用默认值', e);
        }
        updatePointsUI();
    }

    function saveData() {
        try {
            // 保存 items 时剥离 imgData（图片单独存）
            localStorage.setItem('xqh_items', JSON.stringify(items));
            localStorage.setItem('xqh_exchanges', JSON.stringify(exchanges));
            localStorage.setItem('xqh_blind', JSON.stringify(blindHistory));
            localStorage.setItem('xqh_points', String(userPoints));
            if(hiddenUnlocked) localStorage.setItem('xqh_hidden', 'true');
        } catch(e) {
            // localStorage 可能已满（base64 图片较大）
            showToast('⚠️ 存储空间不足，图片未保存，其他数据已保存');
        }
    }

    function saveItemImage(itemId, dataUrl) {
        try {
            localStorage.setItem(`xqh_img_${itemId}`, dataUrl);
            itemImageCache[itemId] = dataUrl;
        } catch(e) {
            showToast('⚠️ 图片过大，无法保存（已记录到本次会话）');
            itemImageCache[itemId] = dataUrl; // 会话内缓存
        }
    }

    function updatePointsUI() {
        const disp = document.getElementById('pointsDisplay');
        if(disp) disp.innerText = userPoints;
        const proxyBtn = document.getElementById('proxyOpenBtn');
        const proxyStatus = document.getElementById('proxyStatus');
        if(userPoints >= 3) {
            if(proxyBtn)    { proxyBtn.disabled = false; proxyBtn.innerText = '🎁 盲盒代开（消耗1积分）'; }
            if(proxyStatus)   proxyStatus.innerText = '✅ 盲盒代开已解锁';
        } else {
            if(proxyBtn)    { proxyBtn.disabled = true; proxyBtn.innerText = `🔒 盲盒代开（还需 ${3 - userPoints} 次交换）`; }
            if(proxyStatus)   proxyStatus.innerText = `🔒 盲盒代开需3次交换（当前 ${userPoints}）`;
        }
    }

    function addPoints(val) {
        userPoints = Math.max(0, userPoints + val);
        updatePointsUI();
        saveData();
    }

    // ─── Toast（替代 alert） ─────────────────────────────────────
    function showToast(msg, duration = 3000) {
        const old = document.querySelector('.toast');
        if(old) old.remove();
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, duration);
    }

    // ─── 盲盒逻辑 ─────────────────────────────────────────────────
    function getScoreFromText(text, userScore) {
        if(typeof userScore === 'number' && !isNaN(userScore)) {
            return Math.min(10, Math.max(1, userScore));
        }
        let base = 5;
        for(const kw of emotionKeywords) if(text.includes(kw)) base = Math.min(10, base + 1);
        if(text.length > 25) base = Math.min(10, base + 1);
        return base;
    }

    function openBlindBox(userInput, userScore) {
        consecutiveMiss++;
        const finalScore = getScoreFromText(userInput, userScore);

        let hiddenChance = 0.04;
        for(const kw of emotionKeywords) if(userInput.includes(kw)) hiddenChance += 0.1;
        if(consecutiveMiss >= 4) hiddenChance = 0.6;
        const hour = new Date().getHours();
        if(hour >= 23 || hour < 2) hiddenChance = Math.min(1, hiddenChance * 1.4);

        let result;
        let isHidden = false;

        if(Math.random() < hiddenChance && !hiddenUnlocked) {
            isHidden = true;
            hiddenUnlocked = true;
            consecutiveMiss = 0;
            result = { ...hiddenPool[Math.floor(Math.random() * hiddenPool.length)] };
        } else {
            // Fix：else 分支只做自增，不再重置（已出隐藏时外层已清零）
            let candidates = commonPool.filter(c => Math.abs(c.score - finalScore) <= 1);
            if(candidates.length === 0) candidates = [...commonPool];
            result = { ...candidates[Math.floor(Math.random() * candidates.length)] };
        }

        const record = {
            what: userInput,
            got: result.name,
            score: result.score,
            isHidden,
            img: result.img,
            message: result.message || '',
            time: new Date().toLocaleString()
        };
        blindHistory.unshift(record);
        if(blindHistory.length > 20) blindHistory.pop();
        saveData();
        renderBlindHistory();
        showResultModal(record);
    }

    function showResultModal(record) {
        const wrap = document.createElement('div');
        wrap.className = 'modal';
        wrap.innerHTML = `
            <div class="modal-content${record.isHidden ? ' hidden-glow' : ''}" style="text-align:center;">
                <div style="font-size:80px; margin-bottom:12px;">${record.img || '🎁'}</div>
                <h2 style="color:#e9b3ff; margin-bottom:8px;">${escapeHtml(record.got)}</h2>
                <p style="color:#b77cff; margin-bottom:6px;">价值评分：${record.score} / 10</p>
                ${record.message ? `<p style="color:#ffc0cb; margin:8px 0;">${escapeHtml(record.message)}</p>` : ''}
                <p style="font-size:0.75rem; color:#8a6eb0; margin-bottom:20px;">你放弃了「${escapeHtml(record.what.substring(0, 40))}」</p>
                <button onclick="this.closest('.modal').remove()" style="background:#8b5cf6; border:none; border-radius:60px; padding:10px 28px; color:white; font-weight:bold;">关闭</button>
            </div>
        `;
        document.body.appendChild(wrap);
        requestAnimationFrame(() => wrap.classList.add('show'));
        // Fix：用 toast 替代 alert，避免阻塞 UI 渲染
        if(record.isHidden) showToast('✨ 隐藏款暴击心灵！你获得了一份珍贵的情感礼物 ✨', 4000);
    }

    // ─── 大厅 ────────────────────────────────────────────────────
    function renderHall() {
        const grid = document.getElementById('itemsGrid');
        if(!grid) return;
        if(items.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#8a6eb0; padding:40px 0;">暂无交换物，快去发布第一个~</div>';
            return;
        }
        grid.innerHTML = items.map(item => {
            const imgData = item.hasImg ? itemImageCache[item.id] : null;
            const imgContent = imgData
                ? `<img src="${imgData}" alt="item" style="width:100%;height:100%;object-fit:cover;">`
                : (item.emoji || '📦');
            return `
                <div class="item-card" data-id="${item.id}">
                    <div class="item-img">${imgContent}</div>
                    <div class="item-info">
                        <div class="item-title">${escapeHtml(item.title)}</div>
                        <div class="item-desc" title="${escapeHtml(item.desc)}">${escapeHtml(item.desc)}</div>
                        <div class="item-footer">
                            <span class="item-value">预期 ${item.value}</span>
                            <div>
                                <button class="resonate-btn" data-id="${item.id}">❤️ ${item.resonate || 0}</button>
                                <button class="exchange-btn" data-id="${item.id}">想换</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        document.querySelectorAll('.item-card').forEach(card => {
            card.addEventListener('click', e => {
                if(e.target.closest('.exchange-btn') || e.target.closest('.resonate-btn')) return;
                const item = items.find(i => i.id === parseInt(card.dataset.id));
                if(item) showDetailModal(item);
            });
        });
        document.querySelectorAll('.resonate-btn').forEach(btn => {
            btn.addEventListener('click', e => {
                e.stopPropagation();
                const idx = items.findIndex(i => i.id === parseInt(btn.dataset.id));
                if(idx !== -1) {
                    items[idx].resonate = (items[idx].resonate || 0) + 1;
                    saveData();
                    renderHall();
                }
            });
        });
        document.querySelectorAll('.exchange-btn').forEach(btn => {
            btn.addEventListener('click', e => {
                e.stopPropagation();
                const target = items.find(i => i.id === parseInt(btn.dataset.id));
                if(target) showExchangeModal(target);
            });
        });
    }

    // ─── 详情弹窗 ────────────────────────────────────────────────
    function showDetailModal(item) {
        const imgData = item.hasImg ? itemImageCache[item.id] : null;
        const imgHtml = imgData
            ? `<img src="${imgData}" class="detail-img" alt="item">`
            : `<div class="detail-img">${item.emoji || '📦'}</div>`;
        document.getElementById('detailContent').innerHTML = `
            ${imgHtml}
            <h2 style="margin:16px 0 8px; color:#f3e5ff;">${escapeHtml(item.title)}</h2>
            <p style="color:#cfb5ff; line-height:1.6;">${escapeHtml(item.desc)}</p>
            <div style="display:flex; justify-content:space-between; margin:20px 0; color:#c9b0ff;">
                <span class="item-value">预期值 ${item.value}</span>
                <span>❤️ ${item.resonate || 0} 共鸣</span>
            </div>
            <button class="exchange-btn" style="width:100%; background:#c084fc; color:#1f0a2e; padding:10px; font-size:1rem; border-radius:60px;">🔥 发起交换</button>
        `;
        document.getElementById('detailModal').classList.add('show');
        document.querySelector('#detailContent .exchange-btn').addEventListener('click', () => {
            closeDetailModal();
            showExchangeModal(item);
        });
    }
    function closeDetailModal() {
        document.getElementById('detailModal').classList.remove('show');
    }

    // ─── 发布 ─────────────────────────────────────────────────────
    let pendingImageData = null; // 当前待发布的图片 base64

    document.getElementById('pubImageInput').addEventListener('change', e => {
        const file = e.target.files[0];
        if(!file) return;
        if(!['image/jpeg','image/png'].includes(file.type)) {
            showToast('只支持 JPEG/PNG 图片');
            e.target.value = '';
            return;
        }
        if(file.size > 2 * 1024 * 1024) {
            showToast('图片超过 2MB，请压缩后再上传');
            e.target.value = '';
            return;
        }
        const reader = new FileReader();
        reader.onload = ev => {
            pendingImageData = ev.target.result;
            document.getElementById('imagePreview').innerHTML =
                `<img src="${pendingImageData}" alt="preview"><span style="font-size:0.75rem; color:#c9b0ff;">图片已选择</span>`;
        };
        reader.readAsDataURL(file);
    });

    function showPublish() {
        pendingImageData = null;
        document.getElementById('imagePreview').innerHTML = '';
        document.getElementById('pubTitle').value = '';
        document.getElementById('pubDesc').value  = '';
        document.getElementById('pubImageInput').value = '';
        document.getElementById('pubValue').value = 5;
        document.getElementById('pubValueShow').innerText = '5';
        document.getElementById('publishModal').classList.add('show');
    }
    function closePublish() {
        document.getElementById('publishModal').classList.remove('show');
    }

    document.getElementById('confirmPublish').addEventListener('click', () => {
        const title = document.getElementById('pubTitle').value.trim();
        const desc  = document.getElementById('pubDesc').value.trim();
        const value = parseInt(document.getElementById('pubValue').value);
        if(!title || !desc) { showToast('请填写标题和描述'); return; }
        const id = Date.now();
        const newItem = { id, title, desc, value, hasImg: !!pendingImageData, emoji:'🎁', creator:'me', resonate:0, time:id };
        if(pendingImageData) saveItemImage(id, pendingImageData);
        items.unshift(newItem);
        saveData();
        renderHall();
        closePublish();
        showPage('hallPage');
        showToast('发布成功！快去大厅看看 🎉');
    });

    document.getElementById('pubValue').addEventListener('input', e => {
        document.getElementById('pubValueShow').innerText = e.target.value;
    });

    // ─── 交换弹窗 ────────────────────────────────────────────────
    let currentTargetItem = null;

    function refreshMyItemsSelect() {
        const select  = document.getElementById('myItemsSelect');
        const myItems = items.filter(i => i.creator === 'me');
        select.innerHTML = '<option value="new">➕ 临时新建交换物</option>'
            + myItems.map(i => `<option value="${i.id}">${escapeHtml(i.title)}（价值${i.value}）</option>`).join('');
    }

    function showExchangeModal(target) {
        currentTargetItem = target;
        document.getElementById('exchangeTargetInfo').innerHTML =
            `<strong style="color:#e9b3ff;">${escapeHtml(target.title)}</strong>（预期值 ${target.value}）<br>
             <span style="font-size:0.8rem;">${escapeHtml(target.desc.substring(0, 60))}${target.desc.length > 60 ? '…' : ''}</span>`;
        refreshMyItemsSelect();
        const myItems = items.filter(i => i.creator === 'me');
        const diff = myItems[0] ? Math.abs(target.value - myItems[0].value) : 99;
        document.getElementById('matchHint').innerHTML = diff <= 2
            ? '🟢 价值观接近，可尝试' : '🟡 价值偏差较大，建议协商';
        document.getElementById('exchangeModal').classList.add('show');
    }
    function closeExchangeModal() {
        document.getElementById('exchangeModal').classList.remove('show');
        currentTargetItem = null;
    }

    function confirmExchange() {
        if(!currentTargetItem) return;
        const val = document.getElementById('myItemsSelect').value;
        if(val === 'new') {
            items.push({ id: Date.now(), title:"临时瞎换物", desc:"临时起意，想换点有趣的", value:5, hasImg:false, emoji:'🎲', creator:'me', resonate:0, time:Date.now() });
            saveData();
            showToast('已创建临时物品，发起交换请求（演示）');
        } else {
            showToast(`交换请求已发送给「${currentTargetItem.title}」的发布者（演示模式）`);
        }
        exchanges.push({ targetId: currentTargetItem.id, time: new Date().toLocaleString() });
        addPoints(1);
        renderHall();
        renderProfile();
        closeExchangeModal();
    }

    document.getElementById('confirmExchangeBtn').addEventListener('click', confirmExchange);

    // Fix：quickNewForExchange 直接刷新 select，不再 alert
    document.getElementById('quickNewForExchange').addEventListener('click', () => {
        items.push({ id: Date.now(), title:"即兴交换物", desc:"即兴创作，期待你的回应", value:5, hasImg:false, emoji:'🎲', creator:'me', resonate:0, time:Date.now() });
        saveData();
        refreshMyItemsSelect();
        showToast('已添加「即兴交换物」，可在下拉框选择');
    });

    // ─── 盲盒代开 ────────────────────────────────────────────────
    function proxyOpen() {
        if(userPoints < 3) { showToast(`积分不足，还需要 ${3 - userPoints} 次交换`); return; }
        if(items.length === 0) { showToast('暂无交换物可代开'); return; }
        const randomItem = items[Math.floor(Math.random() * items.length)];
        const record = {
            what: '盲盒代开',
            got: randomItem.title,
            score: randomItem.value,
            isHidden: false,
            img: randomItem.hasImg ? '📷' : '🎁',
            message: `代开获得：${randomItem.title}`,
            time: new Date().toLocaleString()
        };
        blindHistory.unshift(record);
        if(blindHistory.length > 20) blindHistory.pop();
        addPoints(-1);
        saveData();
        renderBlindHistory();
        renderProfile();
        showToast(`🎁 代开成功！获得「${randomItem.title}」（价值${randomItem.value}）`);
    }

    // ─── 个人中心 ────────────────────────────────────────────────
    function renderProfile() {
        const container = document.getElementById('profileContent');
        if(!container) return;
        const myCount = items.filter(i => i.creator === 'me').length;
        container.innerHTML = `
            <div>📦 我的发布：${myCount} 个</div>
            <div>🎲 盲盒次数：${blindHistory.length}</div>
            <div>💎 交换积分：${userPoints}</div>
            <div>✨ 隐藏款解锁：${hiddenUnlocked ? '<span style="color:gold;">✅ 是</span>' : '❌ 否'}</div>
            <div style="margin-top:20px;">
                <button onclick="clearAllData()" class="btn-primary">重置所有数据</button>
            </div>
        `;
    }

    function clearAllData() {
        if(confirm('重置所有数据，清空大厅、盲盒历史和积分？')) {
            localStorage.clear();
            location.reload();
        }
    }

    // ─── 盲盒历史 ────────────────────────────────────────────────
    function renderBlindHistory() {
        const container = document.getElementById('blindHistoryList');
        if(!container) return;
        if(blindHistory.length === 0) {
            container.innerHTML = '<div style="color:#8a6eb0; padding:8px 0;">还没有盲盒记录，快去开一个吧</div>';
            return;
        }
        container.innerHTML = blindHistory.slice(0, 8).map(h => `
            <div class="history-item">
                <span style="font-size:1.4rem;">${h.img || '🎲'}</span>
                <div>
                    <strong style="color:#f3e5ff;">${escapeHtml(h.got)}</strong>
                    ${h.isHidden ? '<span style="color:gold; margin-left:4px;">✨</span>' : ''}
                    <br>
                    <span style="font-size:0.72rem; color:#9a80c0;">${escapeHtml(h.what.substring(0, 30))} → 价值${h.score}</span>
                </div>
            </div>
        `).join('');
    }

    // ─── 页面切换 ────────────────────────────────────────────────
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        const target = document.getElementById(pageId);
        if(target) target.classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const nav = document.querySelector(`.nav-item[data-page="${pageId}"]`);
        if(nav) nav.classList.add('active');
        if(pageId === 'hallPage')     renderHall();
        if(pageId === 'profilePage')  renderProfile();
        if(pageId === 'blindboxPage') renderBlindHistory();
    }

    // ─── 工具 ─────────────────────────────────────────────────────
    function escapeHtml(str) {
        if(typeof str !== 'string') return '';
        return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    // ─── 事件绑定 ────────────────────────────────────────────────
    document.getElementById('openBlindBtn').addEventListener('click', () => {
        const input = document.getElementById('blindInput').value.trim();
        if(!input) { showToast('输入你想丢掉的东西～'); return; }
        const score = parseInt(document.getElementById('blindScoreSlider').value);
        openBlindBox(input, score);
        document.getElementById('blindInput').value = '';
    });
    document.getElementById('blindInput').addEventListener('keydown', e => {
        if(e.key === 'Enter') document.getElementById('openBlindBtn').click();
    });
    document.getElementById('blindScoreSlider').addEventListener('input', e => {
        document.getElementById('scoreValue').innerText = e.target.value;
    });
    document.getElementById('proxyOpenBtn').addEventListener('click', proxyOpen);
    document.querySelectorAll('.nav-item').forEach(nav => {
        nav.addEventListener('click', () => showPage(nav.getAttribute('data-page')));
    });

    // 暴露给 HTML onclick
    window.showPage           = showPage;
    window.showPublish        = showPublish;
    window.closePublish       = closePublish;
    window.closeExchangeModal = closeExchangeModal;
    window.closeDetailModal   = closeDetailModal;
    window.clearAllData       = clearAllData;

    // ─── 初始化 ──────────────────────────────────────────────────
    loadData();
    renderHall();
    renderBlindHistory();
    renderProfile();
</script>
</body>
</html>
