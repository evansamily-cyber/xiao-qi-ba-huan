<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>瞎七八换 · 不靠谱交换冒险</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Poppins', 'Courier New', monospace;
        }
        body {
            background: radial-gradient(circle at 10% 20%, #1a0b2e, #0a0410);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        /* 恶魔装饰 */
        .devil-bg {
            position: fixed;
            bottom: 10px;
            left: 10px;
            font-size: 70px;
            opacity: 0.2;
            pointer-events: none;
            z-index: 0;
        }
        .devil-bg-right {
            top: 20px;
            right: 20px;
            left: auto;
            bottom: auto;
            font-size: 50px;
        }
        /* 主容器 */
        .app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }
        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #e9b3ff, #b45eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 4px;
        }
        .sub {
            color: #b77cff;
            margin-top: 5px;
        }
        /* 卡片通用样式 */
        .card {
            background: rgba(25, 15, 40, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(168, 85, 247, 0.5);
            padding: 24px;
            margin-bottom: 24px;
            transition: 0.2s;
        }
        /* 两个主入口 */
        .entry-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .entry {
            background: linear-gradient(145deg, #2a1b3a, #1f102f);
            border-radius: 40px;
            padding: 28px 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #7c3aed;
        }
        .entry:hover {
            transform: translateY(-5px);
            border-color: #d946ef;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
        }
        .entry-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .entry-title {
            font-size: 1.6rem;
            font-weight: bold;
            color: #e2b5ff;
        }
        .entry-desc {
            color: #b088e0;
            font-size: 0.8rem;
            margin-top: 8px;
        }
        /* 快速盲盒输入框 */
        .quick-blindbox {
            background: rgba(0,0,0,0.4);
            border-radius: 80px;
            display: flex;
            padding: 5px;
            border: 1px solid #a855f7;
        }
        .quick-blindbox input {
            flex: 1;
            background: none;
            border: none;
            padding: 16px 24px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .quick-blindbox input::placeholder {
            color: #8a6eb0;
            font-style: italic;
        }
        .quick-blindbox button {
            background: #7c3aed;
            border: none;
            border-radius: 60px;
            padding: 0 28px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.1s;
        }
        .quick-blindbox button:active {
            transform: scale(0.97);
        }
        /* 导航栏 */
        .nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 10, 25, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 20px;
            border-top: 1px solid #a855f7;
            z-index: 100;
        }
        .nav-item {
            text-align: center;
            color: #b088e0;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.1s;
            padding: 4px 12px;
            border-radius: 40px;
        }
        .nav-item.active {
            background: #7c3aed;
            color: white;
        }
        /* 页面容器 */
        .page {
            display: none;
        }
        .page.active-page {
            display: block;
        }
        /* 大厅卡片 */
        .item-card {
            background: rgba(30, 20, 45, 0.7);
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            border-left: 4px solid #a855f7;
        }
        .item-img {
            width: 80px;
            height: 80px;
            background: #3a2a5a;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .item-info {
            flex: 1;
        }
        .item-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #f0d6ff;
        }
        .item-desc {
            font-size: 0.8rem;
            color: #c9b0ff;
            margin: 6px 0;
        }
        .item-value {
            display: inline-block;
            background: #7c3aed;
            border-radius: 40px;
            padding: 2px 12px;
            font-size: 0.7rem;
            margin-top: 8px;
        }
        .exchange-btn {
            background: #b45eff;
            border: none;
            border-radius: 60px;
            padding: 6px 18px;
            color: #1f0a2e;
            font-weight: bold;
            cursor: pointer;
        }
        /* 盲盒结果弹窗 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal.show {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background: #1f1135;
            border-radius: 48px;
            max-width: 90%;
            width: 400px;
            padding: 32px;
            text-align: center;
            border: 2px solid #d946ef;
            color: #f0d6ff;
        }
        .modal-content input,
        .modal-content textarea,
        .modal-content select {
            width: 100%;
            background: #2a1b3a;
            border: 1px solid #a855f7;
            border-radius: 12px;
            color: #f0d6ff;
            padding: 10px 14px;
            margin-bottom: 12px;
            outline: none;
            font-size: 0.9rem;
            font-family: inherit;
        }
        .modal-content button {
            background: #7c3aed;
            border: none;
            border-radius: 40px;
            padding: 10px 24px;
            color: white;
            font-weight: bold;
            margin: 6px 4px 0;
            cursor: pointer;
            transition: 0.1s;
        }
        .modal-content button:hover {
            background: #9b59ff;
        }
        .hidden-glow {
            animation: glow 0.6s ease-out;
        }
        @keyframes glow {
            0% { text-shadow: 0 0 0 white; box-shadow: 0 0 0 0 #d946ef; }
            100% { text-shadow: 0 0 20px gold; box-shadow: 0 0 30px 10px #ff66cc; }
        }
        @keyframes shake {
            0% { transform: translate(1px,1px);}
            100% { transform: translate(-1px,-1px);}
        }
        button {
            cursor: pointer;
        }
        @media (max-width: 700px) {
            .entry-grid { grid-template-columns: 1fr; }
            .item-card { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="devil-bg">👿</div>
<div class="devil-bg devil-bg-right">😈</div>
<div class="app">
    <div class="header">
        <h1>瞎七八换</h1>
        <div class="sub">不靠谱交换冒险 · 把你不要的换成你没想到的</div>
    </div>

    <!-- 首页（展示入口+快速盲盒） -->
    <div id="homePage" class="page active-page">
        <div class="entry-grid">
            <div class="entry" onclick="showPage('blindboxPage')">
                <div class="entry-icon">🎲</div>
                <div class="entry-title">随机盲盒</div>
                <div class="entry-desc">闭眼瞎换，输入你想丢掉的东西</div>
            </div>
            <div class="entry" onclick="showPage('hallPage')">
                <div class="entry-icon">🏛️</div>
                <div class="entry-title">交换大厅</div>
                <div class="entry-desc">看看别人在换什么，发起交易</div>
            </div>
        </div>
        <div class="card">
            <div style="margin-bottom: 12px; color:#e2b5ff;">⚡ 快速瞎换 (1秒盲盒)</div>
            <div class="quick-blindbox">
                <input type="text" id="quickBlindInput" placeholder="无趣的人类，你今天想交换什么来给你的一天增添涟漪？">
                <button id="quickBlindBtn">开！</button>
            </div>
        </div>
        <div class="card" style="text-align:center; color:#b77cff;">
            💡 小恶魔提示：输入越走心，越容易触发「隐藏款」暴击心灵
        </div>
    </div>

    <!-- 交换大厅页 -->
    <div id="hallPage" class="page">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="color:#e2b5ff;">📦 大家正在瞎换什么</h3>
                <button onclick="showPublish()" style="background:#7c3aed; border:none; border-radius:60px; padding:6px 16px; color:white;">+ 发布</button>
            </div>
            <div id="itemsList" style="margin-top: 20px;">加载中...</div>
        </div>
    </div>

    <!-- 随机盲盒页 -->
    <div id="blindboxPage" class="page">
        <div class="card">
            <h3 style="color:#e2b5ff;">🎁 随机盲盒</h3>
            <div style="margin: 20px 0;">
                <input type="text" id="blindInput" placeholder="我想丢掉..." style="width:100%; padding:14px; border-radius:60px; background:#2a1b3a; border:1px solid #a855f7; color:white; outline:none; font-size:1rem;">
                <div style="margin: 12px 0; display: flex; gap:12px; align-items:center; color:#e2b5ff;">
                    <span>预期值 (1~10): </span>
                    <input type="range" id="blindScoreSlider" min="1" max="10" value="5" step="1" style="flex:1;">
                    <span id="scoreValue">5</span>
                    <span style="font-size:0.7rem;">(可微调)</span>
                </div>
                <button id="openBlindBtn" style="background: linear-gradient(95deg,#7c3aed,#c026d3); width:100%; padding:12px; border-radius:60px; font-size:1.2rem; border:none; color:white; font-weight:bold;">🎲 瞎七八换</button>
            </div>
            <div id="recentBlind" style="margin-top:20px; border-top:1px solid #4a2e6e; padding-top:16px;">
                <div style="color:#b77cff; margin-bottom:8px;">最近抽取记录</div>
                <div id="historyList"></div>
            </div>
        </div>
    </div>

    <!-- 个人中心页（简化） -->
    <div id="profilePage" class="page">
        <div class="card">
            <h3 style="color:#e2b5ff;">😈 我的小恶魔仓库</h3>
            <div id="profileContent" style="color:#c9b0ff; margin-top:16px;">加载中...</div>
        </div>
    </div>

    <!-- 发布弹窗 -->
    <div id="publishModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px; color:#e2b5ff;">发布你的交换物</h3>
            <input type="text" id="pubTitle" placeholder="标题">
            <textarea id="pubDesc" placeholder="描述（它是什么？为什么想换？）" rows="3"></textarea>
            <div style="margin-bottom:12px; color:#e2b5ff; display:flex; align-items:center; gap:10px;">
                <span>预期值: </span>
                <input type="range" id="pubValue" min="1" max="10" value="5" style="flex:1; margin-bottom:0;">
                <span id="pubValueShow">5</span>
            </div>
            <div>
                <button id="confirmPublish">发布到大厅</button>
                <button onclick="closePublish()" style="background:transparent; border:1px solid #a855f7;">取消</button>
            </div>
        </div>
    </div>

    <!-- 交换详情/发起交换弹窗 -->
    <div id="exchangeModal" class="modal">
        <div class="modal-content">
            <h3 style="color:#e2b5ff; margin-bottom:16px;">发起交换</h3>
            <div id="exchangeTargetInfo" style="margin-bottom:16px; color:#c9b0ff;"></div>
            <div style="margin: 16px 0; color:#e2b5ff; text-align:left;">
                <label>用我的什么东西交换？</label>
                <select id="myItemsSelect" style="margin-top:8px;"></select>
            </div>
            <div id="matchHint" style="font-size:0.8rem; color:#b77cff; margin-bottom:12px;"></div>
            <div>
                <button id="confirmExchangeBtn" style="background:#c026d3;">确认交换</button>
                <button onclick="closeExchangeModal()" style="background:transparent; border:1px solid #a855f7;">取消</button>
            </div>
        </div>
    </div>
</div>

<div class="nav">
    <div class="nav-item active" data-page="homePage">🏠 首页</div>
    <div class="nav-item" data-page="hallPage">🏛️ 大厅</div>
    <div class="nav-item" data-page="blindboxPage">🎲 盲盒</div>
    <div class="nav-item" data-page="profilePage">👤 我的</div>
</div>

<script>
    // ---------- 初始化数据 ----------
    let items = [];        // 大厅发布的交换物
    let exchanges = [];    // 成功交换记录
    let blindHistory = []; // 盲盒抽取记录 { what, got, score, isHidden }
    let hiddenUnlocked = false; // 是否抽到过隐藏款（用于展示收藏）
    let exchangeCounter = 0;    // 连续盲盒次数，用于保底隐藏

    // 内置交换物池（随机盲盒用）
    const commonPool = [
        { name: "一只在路上的牛", score: 2, type:"普通", img:"🐮" },
        { name: "八卦：楼下邻居的真实身份", score: 3, type:"稀有", img:"🗣️" },
        { name: "加班摸鱼指南", score: 4, type:"稀有", img:"📖" },
        { name: "前男友的悔过书（复印件）", score: 5, type:"史诗", img:"💔" },
        { name: "永续黑眼圈使用权", score: 6, type:"史诗", img:"👁️" },
        { name: "老板的脑回路U盘", score: 8, type:"传说", img:"🧠" },
        { name: "一次假装社牛的机会", score: 7, type:"史诗", img:"🦜" },
        { name: "无人知晓的树洞秘密", score: 5, type:"稀有", img:"🌳" }
    ];
    // 隐藏款池
    const hiddenPool = [
        { name: "一个迟到的拥抱", score: 10, type:"隐藏", img:"🤗", message:"那一刻，有人穿越时间抱住了你。" },
        { name: "你从未收到的道歉信", score: 10, type:"隐藏", img:"💌", message:"对不起……其实他一直都知道。" },
        { name: "母亲没说出口的骄傲", score: 10, type:"隐藏", img:"👩", message:"她常常跟邻居提起你，只是从不让你知道。" },
        { name: "那个雨夜的自己", score: 10, type:"隐藏", img:"🌧️", message:"你原谅了从前那个笨拙的自己。" }
    ];
    // 情感关键词（用于提高隐藏概率）
    const emotionKeywords = ["后悔","失去","想念","愧疚","孤单","妈妈","父亲","奶奶","遗憾","对不起","再见","别离","痛哭","崩溃"];

    // 加载本地数据
    function loadData() {
        try {
            const stored = localStorage.getItem('xiaqibahuan_items');
            if(stored) items = JSON.parse(stored);
            else {
                items = [
                    { id: Date.now()+1, title:"加班怨气一团", desc:"连续加班两周的怨念，浓得化不开", value:4, creator:"匿名", img:"💢" },
                    { id: Date.now()+2, title:"前任的围巾", desc:"挺暖和的，但留着尴尬", value:6, creator:"匿名", img:"🧣" },
                    { id: Date.now()+3, title:"学会弹《小星星》的技能", desc:"可教，换一个有趣的故事", value:3, creator:"🎹" }
                ];
            }
            const hist = localStorage.getItem('xiaqibahuan_blindHistory');
            if(hist) blindHistory = JSON.parse(hist);
            const ex = localStorage.getItem('xiaqibahuan_exchanges');
            if(ex) exchanges = JSON.parse(ex);
            const hiddenFlag = localStorage.getItem('xiaqibahuan_hiddenUnlocked');
            if(hiddenFlag) hiddenUnlocked = true;
        } catch(e) {
            console.warn('数据加载失败，使用默认值', e);
        }
        renderHall();
        renderProfile();
        renderHistory();
    }

    function saveData() {
        try {
            localStorage.setItem('xiaqibahuan_items', JSON.stringify(items));
            localStorage.setItem('xiaqibahuan_blindHistory', JSON.stringify(blindHistory));
            localStorage.setItem('xiaqibahuan_exchanges', JSON.stringify(exchanges));
            if(hiddenUnlocked) localStorage.setItem('xiaqibahuan_hiddenUnlocked', 'true');
        } catch(e) {
            console.warn('数据保存失败', e);
        }
    }

    // 关键词打分辅助
    function getScoreFromText(text, userScore) {
        if(userScore !== null && userScore !== undefined) return Math.min(10, Math.max(1, parseInt(userScore)));
        let base = 5;
        for(let kw of emotionKeywords) {
            if(text.includes(kw)) base = Math.min(10, base + 1);
        }
        if(text.length > 20) base = Math.min(10, base + 1);
        return base;
    }

    // 随机盲盒核心
    function openBlindBox(userInput, userScore) {
        exchangeCounter++;
        const finalScore = getScoreFromText(userInput, userScore);
        let isHidden = false;

        // 隐藏触发逻辑
        let hiddenChance = 0.05;
        for(let kw of emotionKeywords) {
            if(userInput.includes(kw)) hiddenChance += 0.15;
        }
        if(exchangeCounter >= 4) hiddenChance = 0.8;
        const hour = new Date().getHours();
        if(hour >= 23 || hour < 2) hiddenChance = Math.min(1, hiddenChance * 1.5);

        let resultItem = null;
        if(Math.random() < hiddenChance && !hiddenUnlocked) {
            isHidden = true;
            hiddenUnlocked = true;
            resultItem = { ...hiddenPool[Math.floor(Math.random() * hiddenPool.length)], isHidden: true };
        } else {
            let candidates = commonPool.filter(c => Math.abs(c.score - finalScore) <= 1);
            if(candidates.length === 0) candidates = commonPool;
            resultItem = { ...candidates[Math.floor(Math.random() * candidates.length)], isHidden: false };
        }

        const record = {
            what: userInput,
            got: resultItem.name,
            score: finalScore,
            isHidden,
            time: new Date().toLocaleString(),
            img: resultItem.img,
            message: resultItem.message || ''
        };
        blindHistory.unshift(record);
        if(blindHistory.length > 20) blindHistory.pop();
        saveData();
        renderHistory();
        showBlindResult(record);
        if(isHidden || exchangeCounter >= 4) exchangeCounter = 0;
    }

    function showBlindResult(record) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content${record.isHidden ? ' hidden-glow' : ''}" style="text-align:center;">
                <div style="font-size:80px; margin-bottom:12px;">${record.img || '🎁'}</div>
                <h2 style="color:#e9b3ff; margin-bottom:8px;">${escapeHtml(record.got)}</h2>
                <p style="color:#b77cff; margin-bottom:6px;">价值评分: ${record.score}</p>
                ${record.message ? `<p style="color:#ffc0cb; margin-bottom:6px;">${escapeHtml(record.message)}</p>` : ''}
                <p style="font-size:0.75rem; color:#8a6eb0; margin-bottom:20px;">"${escapeHtml(record.what.substring(0,30))}" 换来的</p>
                <button onclick="this.closest('.modal').remove()">关闭</button>
            </div>
        `;
        document.body.appendChild(modal);
        // 触发过渡动画
        requestAnimationFrame(() => modal.classList.add('show'));
    }

    function renderHistory() {
        const container = document.getElementById('historyList');
        if(!container) return;
        if(blindHistory.length === 0) {
            container.innerHTML = '<div style="color:#8a6eb0;">暂无盲盒记录，快去试试</div>';
            return;
        }
        container.innerHTML = blindHistory.slice(0, 5).map(h => `
            <div style="border-bottom:1px solid #4a2e6e; padding:8px 0; color:#c9b0ff; font-size:0.85rem;">
                🧸 你丢了"${escapeHtml(h.what.substring(0,20))}" → 得到 ${escapeHtml(h.got)} ${h.isHidden ? '<span style="color:gold;">✨隐藏款✨</span>' : ''}
            </div>
        `).join('');
    }

    // 交换大厅渲染
    function renderHall() {
        const container = document.getElementById('itemsList');
        if(!container) return;
        if(items.length === 0) {
            container.innerHTML = '<div style="color:#8a6eb0;">空空如也，快去发布你的第一个交换物吧</div>';
            return;
        }
        container.innerHTML = items.map(item => `
            <div class="item-card">
                <div class="item-img">${item.img || '📦'}</div>
                <div class="item-info">
                    <div class="item-title">${escapeHtml(item.title)}</div>
                    <div class="item-desc">${escapeHtml(item.desc || '')}</div>
                    <div class="item-value">预期值 ${item.value}</div>
                    <button class="exchange-btn" data-id="${item.id}" style="margin-top:8px;">想换</button>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.exchange-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = parseInt(btn.getAttribute('data-id'));
                const targetItem = items.find(i => i.id === id);
                if(targetItem) showExchangeModal(targetItem);
            });
        });
    }

    let currentTarget = null;

    function showExchangeModal(target) {
        currentTarget = target;
        const modal = document.getElementById('exchangeModal');
        document.getElementById('exchangeTargetInfo').innerHTML = `你想交换: <strong style="color:#e9b3ff;">${escapeHtml(target.title)}</strong>（价值 ${target.value}）`;
        const select = document.getElementById('myItemsSelect');
        const myItems = items.filter(i => i.creator === 'me');
        select.innerHTML = '<option value="new">+ 临时新建交换物</option>' +
            myItems.map(i => `<option value="${i.id}">${escapeHtml(i.title)} (价值${i.value})</option>`).join('');
        document.getElementById('matchHint').innerHTML = '';
        modal.classList.add('show');
    }

    function closeExchangeModal() {
        document.getElementById('exchangeModal').classList.remove('show');
    }

    function confirmExchange() {
        if(!currentTarget) return;
        const selectedVal = document.getElementById('myItemsSelect').value;
        if(selectedVal === 'new') {
            const newItem = { id: Date.now(), title:"临时瞎换物", desc:"随便拿来换的", value:5, creator:'me', img:'🎁' };
            items.push(newItem);
            saveData();
            alert('已创建临时物品，发起交换请求（演示）');
        } else {
            alert(`交换请求已发送给「${currentTarget.title}」的发布者（演示模式）`);
        }
        closeExchangeModal();
        renderHall();
    }

    function showPublish() {
        document.getElementById('publishModal').classList.add('show');
    }

    function closePublish() {
        document.getElementById('publishModal').classList.remove('show');
        document.getElementById('pubTitle').value = '';
        document.getElementById('pubDesc').value = '';
        document.getElementById('pubValue').value = 5;
        document.getElementById('pubValueShow').innerText = '5';
    }

    document.getElementById('confirmPublish').addEventListener('click', () => {
        const title = document.getElementById('pubTitle').value.trim();
        const desc = document.getElementById('pubDesc').value.trim();
        const value = parseInt(document.getElementById('pubValue').value);
        if(!title) { alert('标题不能为空'); return; }
        items.push({ id: Date.now(), title, desc, value, creator:'me', img:'🎲' });
        saveData();
        renderHall();
        closePublish();
        showPage('hallPage');
    });

    function renderProfile() {
        const container = document.getElementById('profileContent');
        if(!container) return;
        const myItems = items.filter(i => i.creator === 'me');
        container.innerHTML = `
            <div style="margin-bottom:8px;">📦 我的发布: ${myItems.length} 个</div>
            <div style="margin-bottom:8px;">🎲 盲盒次数: ${blindHistory.length}</div>
            <div style="margin-bottom:20px;">✨ 隐藏款解锁: ${hiddenUnlocked ? '<span style="color:gold;">✅ 是</span>' : '❌ 否'}</div>
            <button onclick="clearAllData()" style="background:#7c3aed; border:none; border-radius:40px; padding:10px 24px; color:white; cursor:pointer;">重置所有数据</button>
        `;
    }

    function clearAllData() {
        if(confirm('重置所有数据，清空大厅和盲盒历史？')) {
            localStorage.clear();
            location.reload();
        }
    }

    // 页面切换
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        const target = document.getElementById(pageId);
        if(target) target.classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        const activeNav = document.querySelector(`.nav-item[data-page="${pageId}"]`);
        if(activeNav) activeNav.classList.add('active');
        if(pageId === 'hallPage') renderHall();
        if(pageId === 'profilePage') renderProfile();
        if(pageId === 'blindboxPage') renderHistory();
    }

    // 快速盲盒
    document.getElementById('quickBlindBtn').addEventListener('click', () => {
        const input = document.getElementById('quickBlindInput').value.trim();
        if(!input) { alert('输入你想丢掉的东西～'); return; }
        openBlindBox(input, null);
        document.getElementById('quickBlindInput').value = '';
    });

    // 支持回车触发快速盲盒
    document.getElementById('quickBlindInput').addEventListener('keydown', (e) => {
        if(e.key === 'Enter') document.getElementById('quickBlindBtn').click();
    });

    document.getElementById('openBlindBtn').addEventListener('click', () => {
        const input = document.getElementById('blindInput').value.trim();
        if(!input) { alert('输入点什么'); return; }
        const score = parseInt(document.getElementById('blindScoreSlider').value);
        openBlindBox(input, score);
        document.getElementById('blindInput').value = '';
    });

    document.getElementById('blindInput').addEventListener('keydown', (e) => {
        if(e.key === 'Enter') document.getElementById('openBlindBtn').click();
    });

    document.getElementById('blindScoreSlider').addEventListener('input', (e) => {
        document.getElementById('scoreValue').innerText = e.target.value;
    });

    document.getElementById('pubValue').addEventListener('input', (e) => {
        document.getElementById('pubValueShow').innerText = e.target.value;
    });

    document.getElementById('confirmExchangeBtn').addEventListener('click', confirmExchange);

    // 导航栏绑定
    document.querySelectorAll('.nav-item').forEach(nav => {
        nav.addEventListener('click', () => showPage(nav.getAttribute('data-page')));
    });

    function escapeHtml(str) {
        if(typeof str !== 'string') return '';
        return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    // 暴露全局（供 HTML onclick 调用）
    window.showPage = showPage;
    window.showPublish = showPublish;
    window.closePublish = closePublish;
    window.closeExchangeModal = closeExchangeModal;
    window.clearAllData = clearAllData;

    loadData();
</script>
</body>
</html>
